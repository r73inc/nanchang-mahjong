name: Deploy

# Triggered on every push to main (after PR merge).
# Runs the full CI suite first; only deploys on success.
on:
  push:
    branches:
      - main

permissions:
  id-token: write # required for OIDC → AWS credentials
  contents: read

env:
  AWS_REGION: ap-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Guard: run full CI before deploying ──────────────────────────────────────
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ── Job 1: Build web → sync to S3 → invalidate CloudFront ───────────────────
  deploy-web:
    name: Deploy Web (S3 + CloudFront)
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @nanchang/web run build
        env:
          VITE_API_BASE_URL: '' # CloudFront proxies /api/* → App Runner

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync build to S3
        run: |
          aws s3 sync apps/web/dist/ s3://${{ secrets.WEB_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "sw.js"
          # index.html and sw.js must not be cached
          aws s3 cp apps/web/dist/index.html s3://${{ secrets.WEB_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
          aws s3 cp apps/web/dist/sw.js s3://${{ secrets.WEB_BUCKET_NAME }}/sw.js \
            --cache-control "no-cache, no-store, must-revalidate" \
            || true  # sw.js might not exist if build excludes it

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ── Job 2: Build API Docker image → ECR → redeploy App Runner ────────────────
  deploy-api:
    name: Deploy API (ECR + App Runner)
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -f apps/api/Dockerfile \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Trigger App Runner deployment
        env:
          APP_RUNNER_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
        run: |
          aws apprunner start-deployment \
            --service-arn "$APP_RUNNER_ARN"

  # ── Job 3: Smoke tests against production ─────────────────────────────────────
  smoke-test:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-api]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke tests
        run: pnpm exec playwright test test/e2e/smoke.spec.ts
        env:
          WEB_URL: ${{ secrets.PROD_WEB_URL }}
          API_URL: ${{ secrets.PROD_API_URL }}
