services:
  # ── DynamoDB Local ───────────────────────────────────────────
  # Prod equivalent: AWS DynamoDB (on-demand, ap-east-1)
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: mj-dynamodb
    ports:
      - '8000:8000'
    command: ['-jar', 'DynamoDBLocal.jar', '-sharedDb', '-inMemory']
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8000/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible) ────────────────────────────────────
  # Prod equivalent: AWS S3 (ap-east-1)
  minio:
    image: minio/minio:latest
    container_name: mj-minio
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Console UI → http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ':9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cognito Local ────────────────────────────────────────────
  # Prod equivalent: AWS Cognito User Pool (ap-east-1)
  cognito:
    image: jagregory/cognito-local:latest
    container_name: mj-cognito
    ports:
      - '9229:9229'
    volumes:
      - cognito-data:/app/.cognito

  # ── MailHog ──────────────────────────────────────────────────
  # Prod equivalent: AWS SES (ap-east-1)
  # Web UI → http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mj-mailhog
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI

  # ── Redis ────────────────────────────────────────────────────
  # Prod equivalent: ElastiCache Serverless Redis (added when concurrency demands it)
  redis:
    image: redis:7-alpine
    container_name: mj-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio-data:
  cognito-data:
