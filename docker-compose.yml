services:
  # ── DynamoDB Local ───────────────────────────────────────────
  # Prod equivalent: AWS DynamoDB (on-demand, ap-east-1)
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: mj-dynamodb
    ports:
      - '8000:8000'
    command: ['-jar', 'DynamoDBLocal.jar', '-sharedDb', '-inMemory']
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8000/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible) ────────────────────────────────────
  # Prod equivalent: AWS S3 (ap-east-1)
  # Console UI → http://localhost:9001  (user: minioadmin / minioadmin)
  minio:
    image: minio/minio:latest
    container_name: mj-minio
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ':9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9000/minio/health/live || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init ────────────────────────────────────────
  # Creates the nanchang-replays bucket on first start, then exits.
  minio-init:
    image: minio/mc:latest
    container_name: mj-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/nanchang-replays &&
        echo 'Bucket nanchang-replays ready.'
      "
    restart: 'no'

  # ── Cognito Local ────────────────────────────────────────────
  # Prod equivalent: AWS Cognito User Pool (ap-east-1)
  cognito:
    image: jagregory/cognito-local:latest
    container_name: mj-cognito
    ports:
      - '9229:9229'
    volumes:
      - cognito-data:/app/.cognito

  # ── MailHog ──────────────────────────────────────────────────
  # Prod equivalent: AWS SES (ap-east-1)
  # Catches all outbound email locally.
  # Web UI → http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mj-mailhog
    ports:
      - '1025:1025' # SMTP (API sends here)
      - '8025:8025' # Web UI (read captured emails)

  # ── Redis ────────────────────────────────────────────────────
  # Prod equivalent: ElastiCache Serverless Redis
  # Used for Socket.IO multi-instance pub/sub and rate-limit state.
  redis:
    image: redis:7-alpine
    container_name: mj-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio-data:
  cognito-data:
