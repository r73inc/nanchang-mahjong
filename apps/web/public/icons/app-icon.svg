<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: jade green rounded square (safe zone 80% = inset 51px all sides) -->
  <rect width="512" height="512" rx="80" fill="#1d5c38"/>
  <!-- Tile drop shadow -->
  <rect x="130" y="94" width="264" height="340" rx="28" fill="rgba(0,0,0,0.22)"/>
  <!-- Tile body -->
  <rect x="124" y="86" width="264" height="340" rx="28" fill="#faf5e8"/>
  <!-- Gold inner border -->
  <rect x="136" y="98" width="240" height="316" rx="20" fill="none" stroke="#c9952a" stroke-width="5"/>
  <!-- Character 麻 (mahjong) -->
  <text
    x="256"
    y="350"
    font-family="'Noto Serif SC', 'Source Han Serif CN', 'AR PL UMing CN', SimSun, 'WenQuanYi Zen Hei', serif"
    font-size="236"
    font-weight="700"
    text-anchor="middle"
    fill="#1a3520">麻</text>
</svg>
